name: 매도 신호 알림

on:
  schedule:
    - cron: '*/5 14-21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'run_once'
        type: choice
        options:
          - run_once
          - summary
          - test

jobs:
  check-signals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 매도 신호 체크
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python alert_main.py --mode ${{ github.event.inputs.mode }}
          elif [ "${{ github.event.schedule }}" == "0 22 * * 1-5" ]; then
            python alert_main.py --mode summary
          else
            python alert_main.py --mode run_once
          fi
